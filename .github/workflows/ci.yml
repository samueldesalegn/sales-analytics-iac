name: ci

on:
  pull_request:
  push:
    branches: [main]

# Required for GitHub OIDC -> AWS role assumption (no long-lived keys)
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  SAM_CONFIG_ENV: dev          # change per branch/environment strategy

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true
      - name: Validate template
        run: sam validate --lint
      - name: Lint with cfn-lint
        run: |
          pip install cfn-lint
          cfn-lint template.yaml

  build:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: sam build

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Sync Glue script to S3
        run: |
          CURATED=$(aws cloudformation describe-stacks \
            --stack-name salespractice-${SAM_CONFIG_ENV} \
            --query "Stacks[0].Outputs[?OutputKey=='CuratedBucket'].OutputValue" \
            --output text 2>/dev/null || echo "")
          if [ -n "$CURATED" ]; then
            aws s3 cp glue/ingest.py "s3://${CURATED}/scripts/ingest.py"
          fi
      - name: Build & deploy
        run: |
          sam build
          sam deploy --config-env ${SAM_CONFIG_ENV} --no-confirm-changeset --no-fail-on-empty-changeset
